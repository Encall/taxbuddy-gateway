# Traefik Dynamic Configuration
# Uses Go template syntax — env vars are injected from the gateway container environment.

http:
  middlewares:
    # Strict auth — returns 401 if token is missing or invalid
    forward-auth:
      forwardAuth:
        address: "http://{{ env "BACKEND_HOST" }}/auth/verify"
        authRequestHeaders:
          - "Authorization"
          - "X-Request-ID"
        authResponseHeaders:
          - "X-User-ID"
          - "X-User-Email"

    # Optional auth — allows guests through with empty X-User-ID
    forward-auth-optional:
      forwardAuth:
        address: "http://{{ env "BACKEND_HOST" }}/auth/verify?mode=optional"
        authRequestHeaders:
          - "Authorization"
          - "X-Request-ID"
        authResponseHeaders:
          - "X-User-ID"
          - "X-User-Email"

  routers:
    # ── Public routes (no auth) ─────────────────────────────────────────────

    health:
      rule: "Path(`/health`)"
      entryPoints: [web]
      service: backend
      priority: 100

    # Covers /api/v1/auth/* and /auth/verify (Traefik forward auth endpoint)
    auth-public:
      rule: "PathPrefix(`/api/v1/auth`) || PathPrefix(`/auth`)"
      entryPoints: [web]
      service: backend
      priority: 95

    # ── Retriever routes ────────────────────────────────────────────────────

    # /api/v2/responses uses optional auth to support guest chat
    retriever-responses:
      rule: "Path(`/api/v2/responses`)"
      entryPoints: [web]
      service: retriever
      middlewares: [forward-auth-optional]
      priority: 80

    # /api/v1/documents, /api/v1/ingest, /api/v1/users — strict auth
    retriever-v1:
      rule: "PathPrefix(`/api/v1/documents`) || PathPrefix(`/api/v1/ingest`) || PathPrefix(`/api/v1/users`)"
      entryPoints: [web]
      service: retriever
      middlewares: [forward-auth]
      priority: 70

    # All other /api/v2/* (conversations, tax, financial-summary, health, etc.)
    retriever-v2:
      rule: "PathPrefix(`/api/v2`)"
      entryPoints: [web]
      service: retriever
      middlewares: [forward-auth]
      priority: 60

    # ── Backend routes ──────────────────────────────────────────────────────

    backend-user:
      rule: "PathPrefix(`/api/v1/user`)"
      entryPoints: [web]
      service: backend
      middlewares: [forward-auth]
      priority: 50

  services:
    backend:
      loadBalancer:
        servers:
          - url: "http://{{ env "BACKEND_HOST" }}"

    retriever:
      loadBalancer:
        servers:
          - url: "http://{{ env "RETRIEVER_HOST" }}"
        healthCheck:
          path: /api/v2/health
          interval: "30s"
          timeout: "5s"
