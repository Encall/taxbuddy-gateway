# Traefik Dynamic Configuration
# Uses Go template syntax — env vars are injected from the gateway container environment.

http:
  middlewares:
    # Strict auth — returns 401 if token is missing or invalid
    forward-auth:
      forwardAuth:
        address: "http://{{ env "BACKEND_HOST" }}/auth/verify"
        authRequestHeaders:
          - "Authorization"
          - "X-Request-ID"
        authResponseHeaders:
          - "X-User-ID"
          - "X-User-Email"

    # Optional auth — allows guests through with empty X-User-ID
    forward-auth-optional:
      forwardAuth:
        address: "http://{{ env "BACKEND_HOST" }}/auth/verify?mode=optional"
        authRequestHeaders:
          - "Authorization"
          - "X-Request-ID"
        authResponseHeaders:
          - "X-User-ID"
          - "X-User-Email"

  routers:
    # ── Public routes (no auth) ─────────────────────────────────────────────

    health:
      rule: "Host(`{{ env "DOMAIN" }}`) && Path(`/health`)"
      entryPoints: [websecure]
      service: backend
      priority: 100
      tls:
        certResolver: letsencrypt

    # Covers /api/v1/auth/* and /auth/verify (Traefik forward auth endpoint)
    auth-public:
      rule: "Host(`{{ env "DOMAIN" }}`) && (PathPrefix(`/api/v1/auth`) || PathPrefix(`/auth`))"
      entryPoints: [websecure]
      service: backend
      priority: 95
      tls:
        certResolver: letsencrypt

    # ── Retriever routes ────────────────────────────────────────────────────

    # /api/v2/responses uses optional auth to support guest chat
    retriever-responses:
      rule: "Host(`{{ env "DOMAIN" }}`) && Path(`/api/v2/responses`)"
      entryPoints: [websecure]
      service: retriever
      middlewares: [forward-auth-optional]
      priority: 80
      tls:
        certResolver: letsencrypt

    # /api/v1/documents, /api/v1/ingest, /api/v1/users — strict auth
    retriever-v1:
      rule: "Host(`{{ env "DOMAIN" }}`) && (PathPrefix(`/api/v1/documents`) || PathPrefix(`/api/v1/ingest`) || PathPrefix(`/api/v1/users`))"
      entryPoints: [websecure]
      service: retriever
      middlewares: [forward-auth]
      priority: 70
      tls:
        certResolver: letsencrypt

    # All other /api/v2/* (conversations, tax, financial-summary, health, etc.)
    retriever-v2:
      rule: "Host(`{{ env "DOMAIN" }}`) && PathPrefix(`/api/v2`)"
      entryPoints: [websecure]
      service: retriever
      middlewares: [forward-auth]
      priority: 60
      tls:
        certResolver: letsencrypt

    # ── Backend routes ──────────────────────────────────────────────────────

    backend-user:
      rule: "Host(`{{ env "DOMAIN" }}`) && PathPrefix(`/api/v1/user`)"
      entryPoints: [websecure]
      service: backend
      middlewares: [forward-auth]
      priority: 50
      tls:
        certResolver: letsencrypt

  services:
    backend:
      loadBalancer:
        servers:
          - url: "http://{{ env "BACKEND_HOST" }}"

    retriever:
      loadBalancer:
        servers:
          - url: "http://{{ env "RETRIEVER_HOST" }}"
        healthCheck:
          path: /api/v2/health
          interval: "30s"
          timeout: "5s"
