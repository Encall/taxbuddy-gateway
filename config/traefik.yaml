# Traefik Static Configuration
# Dynamic routing rules are in dynamic.yaml

entryPoints:
  web:
    address: ":80"
  ping:
    address: ":8082"
  traefik:
    address: ":8080"

ping:
  entryPoint: ping

providers:
  file:
    filename: /config/dynamic.yaml
    watch: true

api:
  dashboard: true
  insecure: true

log:
  level: INFO
  format: common

accessLog:
  format: common
