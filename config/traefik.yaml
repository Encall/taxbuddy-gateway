# Traefik Static Configuration
# Dynamic routing rules are in dynamic.yaml
# ACME (Let's Encrypt) config is passed via docker-compose command flags

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  file:
    filename: /config/dynamic.yaml
    watch: true

api:
  dashboard: true

log:
  level: INFO
  format: common

accessLog:
  format: common
