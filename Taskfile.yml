version: "3"
dotenv: [".env"]

vars:
  TRAEFIK_VERSION: "3.6"
  CONFIG_DIR: "./config"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  run:
    desc: Run Traefik gateway locally in Docker (volume-mounts config, connects to host services)
    aliases: [dev]
    cmds:
      - echo "Starting Traefik..."
      - echo "Backend  -> {{.BACKEND_HOST}}"
      - echo "Retriever -> {{.RETRIEVER_HOST}}"
      - >
        docker run --rm -it
        -p 80:80
        -p 8080:8080
        -v "{{.USER_WORKING_DIR}}/config:/config"
        -e BACKEND_HOST={{.BACKEND_HOST}}
        -e RETRIEVER_HOST={{.RETRIEVER_HOST}}
        -e DOMAIN={{.DOMAIN}}
        --add-host=host.docker.internal:host-gateway
        traefik:{{.TRAEFIK_VERSION}}
        --configFile=/config/traefik.yaml
        --log.level=DEBUG

  build:
    desc: Build gateway Docker image (bakes config into image for production)
    cmds:
      - docker build -t taxbuddy-gateway:latest .

  prod:
    desc: Run the built gateway image in production
    cmds:
      - >
        docker run -d
        --name taxbuddy-gateway
        --restart unless-stopped
        -p 80:80
        -p 443:443
        -v letsencrypt:/letsencrypt
        -e BACKEND_HOST={{.BACKEND_HOST}}
        -e RETRIEVER_HOST={{.RETRIEVER_HOST}}
        -e DOMAIN={{.DOMAIN}}
        taxbuddy-gateway:latest
        --certificatesresolvers.letsencrypt.acme.email={{.ACME_EMAIL}}
        --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
        --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
