version: "3"
dotenv: [".env"]

vars:
  TRAEFIK_VERSION: "3.6"
  CONFIG_DIR: "./config"
  BACKEND_HOST: "{{.BACKEND_HOST}}"
  RETREIVER_HOST: "{{.RETREIVER_HOST}}"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # Run Traefik locally via Docker (builds first)
  run:
    desc: Run Traefik gateway locally in Docker (builds and connects to host backend/retriever)
    aliases: [dev]
    cmds:
      - echo "Starting Traefik in Docker..."
      - echo "Backend -> {{.BACKEND_HOST}}"
      - echo "Retriever -> {{.RETREIVER_HOST}}"
      - >
        docker run --rm -it
        -p 80:80
        -p 8080:8080
        -v "{{.USER_WORKING_DIR}}/config:/config"
        -e BACKEND_HOST={{.BACKEND_HOST}}
        -e RETREIVER_HOST={{.RETREIVER_HOST}}
        --add-host=host.docker.internal:host-gateway
        traefik:{{.TRAEFIK_VERSION}}
        --configFile=/config/traefik.yaml
        --log.level=DEBUG

  # Docker Compose commands for full stack
  docker-build:
    desc: Build Docker image for the gateway
    cmds:
      - docker build -t taxbuddy-gateway:latest .

  docker-up:
    desc: Start all services with Docker Compose
    cmds:
      - docker-compose up -d

  docker-down:
    desc: Stop all Docker Compose services
    cmds:
      - docker-compose down

  docker-logs:
    desc: View Docker Compose logs
    cmds:
      - docker-compose logs -f
