services:
  # Traefik API Gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard (remove in production)
    environment:
      - BACKEND_HOST=backend:8080
      - RETREIVER_HOST=retreiver:8000
    volumes:
      - ./config:/etc/traefik:ro
    networks:
      - taxbuddy-network
    depends_on:
      backend:
        condition: service_healthy
      retreiver:
        condition: service_started
    restart: unless-stopped

  # TaxBuddy Backend Service
  backend:
    build:
      context: ../taxbuddy-backend
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      - JWT_REFRESH_TOKEN_EXPIRY=${JWT_REFRESH_TOKEN_EXPIRY:-7d}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_USE_SSL=${S3_USE_SSL:-false}
    networks:
      - taxbuddy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # TaxBuddy Retreiver Service
  retreiver:
    build:
      context: ../taxbuddy-retreiver
      dockerfile: Dockerfile
    environment:
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - taxbuddy-network
    restart: unless-stopped

networks:
  taxbuddy-network:
    driver: bridge
