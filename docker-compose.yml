services:
  # Traefik API Gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "8080:8080" # Traefik dashboard (remove in production)
    environment:
      - BACKEND_HOST=backend:8080
      - RETREIVER_HOST=retreiver:8000
    volumes:
      - ./config:/config
    networks:
      - taxbuddy-network
    depends_on:
      backend:
        condition: service_healthy
      retreiver:
        condition: service_started
    restart: unless-stopped

networks:
  taxbuddy-network:
    driver: bridge
