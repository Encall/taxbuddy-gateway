name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: >
          Explicit version tag to release (e.g. v1.2.0).
          Leave empty to auto-bump from conventional commits.
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version (auto-bump)
        id: bump
        if: inputs.version == ''
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --bump --bumped-version
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version and changelog
        id: resolved
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version }}" ]; then
            tag="${{ inputs.version }}"
          else
            tag="$(printf '%s' "${{ steps.bump.outputs.content }}" | tr -d '[:space:]')"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.resolved.outputs.tag }} --unreleased --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop if tag already exists
        run: |
          set -euo pipefail
          if git rev-parse "${{ steps.resolved.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.resolved.outputs.tag }} already exists; nothing to release."
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tag release
        run: |
          git tag -a "${{ steps.resolved.outputs.tag }}" -m "Release ${{ steps.resolved.outputs.tag }}"
          git push origin "${{ steps.resolved.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolved.outputs.tag }}
          name: ${{ steps.resolved.outputs.tag }}
          body: ${{ steps.cliff.outputs.content }}
          draft: false
          prerelease: false
