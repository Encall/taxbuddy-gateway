name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to apply"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/taxbuddy-gateway

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      major_minor: ${{ steps.release.outputs.major_minor }}
      notes: ${{ steps.git-cliff.outputs.content }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next version
        id: version
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --bump ${{ github.event.inputs.bump || 'auto' }} --bumped-version
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Normalize version
        id: release
        env:
          NEXT_VERSION: ${{ steps.version.outputs.content }}
        run: |
          set -euo pipefail

          version="$(printf '%s' "$NEXT_VERSION" | tr -d '[:space:]')"
          if [ -z "$version" ]; then
            echo "git-cliff did not produce a version"
            exit 1
          fi

          case "$version" in
            v*)
              tag="$version"
              clean_version="${version#v}"
              ;;
            *)
              tag="v$version"
              clean_version="$version"
              ;;
          esac

          major_minor="$(printf '%s' "$clean_version" | awk -F. '{ print $1 "." $2 }')"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$clean_version" >> "$GITHUB_OUTPUT"
          echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"

      - name: Stop if tag already exists
        run: |
          set -euo pipefail

          if git rev-parse "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.release.outputs.tag }} already exists; nothing to release."
            exit 1
          fi

      - name: Generate release notes
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ steps.release.outputs.tag }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

  publish:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.major_minor }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prepare.outputs.tag }}" -m "Release ${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          body: ${{ needs.prepare.outputs.notes }}
